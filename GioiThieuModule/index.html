<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trang web đánh dấu cột mốc quan trọng khi tôi bắt đầu học lập trình và khám phá thế giới công nghệ.">
    <title>Tôi bắt đầu học lập trình</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <!-- Link External Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Particles Canvas -->
    <canvas id="canvas-particles"></canvas>

    <!-- Main Content Container -->
    <main class="card-container" id="main-card">
        <!-- Status Badge -->
        <div class="badge" id="welcome-badge">
            <span class="badge-dot"></span>
            <span>Hello World</span>
        </div>

        <!-- Main Display Text requested by the User -->
        <h1 class="title" id="main-heading">Tôi bắt đầu học lập trình</h1>

        <!-- Inspirational Quote -->
        <p class="subtitle" id="sub-heading">Hành trình vạn dặm bắt đầu từ một bước chân đầu tiên.</p>

        <!-- Interactive CTA Button -->
        <button class="cta-button" id="cta-btn" aria-label="Bắt đầu hành trình">
            <span>Khám phá ngay</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12H19M19 12L13 6M19 12L13 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </main>

    <!-- Link External Javascript -->
    <script src="script.js"></script>
</body>
</html>
